<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#0d110d"/>
      <stop offset="100%" stop-color="#070907"/>
    </radialGradient>
    <radialGradient id="pixGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cf08c" stop-opacity="1"/>
      <stop offset="35%" stop-color="#5cf08c" stop-opacity="0.45"/>
      <stop offset="70%" stop-color="#5cf08c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#5cf08c" stop-opacity="0"/>
    </radialGradient>
    <filter id="pixBlur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Circle clip so it reads even outside avatar mask -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>

  <!-- Soft glow halo -->
  <circle cx="200" cy="200" r="90" fill="url(#pixGlow)"/>

  <!-- Faint concentric rings — agent ping rings -->
  <circle cx="200" cy="200" r="55" fill="none" stroke="#5cf08c" stroke-opacity="0.10" stroke-width="1"/>
  <circle cx="200" cy="200" r="95" fill="none" stroke="#5cf08c" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#5cf08c" stroke-opacity="0.04" stroke-width="1"/>

  <!-- The single pixel -->
  <rect x="194" y="194" width="12" height="12" fill="#5cf08c"/>
</svg>
